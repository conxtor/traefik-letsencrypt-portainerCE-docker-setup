# This is a basic workflow to help you get started with Actions

name: Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      
      - name: Substitute secrets in docker-compose file
        uses: jwsi/secret-parser@v1
        with:
          filename: traefik/docker-compose.yml
          secret-name: letsencrypt_email
          secret-value: ${{ secrets.LETSENCRYPT_EMAIL }}
          
      -  name: Deploy Traefik via Docker-Compose
         uses: alex-ac/github-action-ssh-docker-compose@master
         with:
           ssh_host: conxtor.com
           ssh_private_key: ${{ secrets.DOCKER_SSH_PRIVATE_KEY }}
           ssh_user: docker-deploy
           docker_compose_prefix: traefik
           docker_compose_filename: traefik/docker-compose.yml
